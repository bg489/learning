  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#182230;--muted:#64748b;--border:#e2e8f0;--primary:#2563eb;--soft:#dbeafe;--dark:#0f172a;--danger:#dc2626;--shadow:0 12px 30px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;line-height:1.55}header{padding:30px 16px 38px;text-align:center;color:white;background:linear-gradient(135deg,#1d4ed8,#7c3aed)}header h1{margin:0 0 8px;font-size:28px}header p{margin:0;opacity:.92}.wrap{max-width:1120px;margin:-24px auto 42px;padding:0 16px}.panel,.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.panel{padding:18px;margin-bottom:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}.stat b{display:block;color:var(--primary);font-size:23px}.stat span{font-size:13px;color:var(--muted)}.bar{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:13px 0 16px}.fill{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:.2s}.controls{display:grid;grid-template-columns:1.2fr .8fr repeat(3,auto);gap:10px}input,select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;background:white;font-size:14px;outline:none}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}button{border:0;border-radius:12px;padding:11px 14px;background:var(--primary);color:white;font-weight:700;cursor:pointer;white-space:nowrap}button.secondary{background:var(--dark)}button.danger{background:var(--danger)}h2{display:flex;gap:10px;align-items:center;margin:28px 0 12px}.badge{font-size:13px;background:var(--soft);color:#1d4ed8;border-radius:999px;padding:4px 10px}.qcard{padding:18px;margin-bottom:14px;box-shadow:0 8px 18px rgba(15,23,42,.04)}.qcard.answered{border-color:#93c5fd;backgroun <script>
const STORAGE_KEY="LISTCH_TrietHocMacLenin_Chuong1_KhaiLuoc_v1";
const questions=[
{id:1,type:"verbatim",q:"Triết học ra đời vào khoảng thời gian nào theo giáo trình?",o:["Từ thế kỷ VIII đến thế kỷ VI trước Công nguyên","Từ thế kỷ III đến thế kỷ I trước Công nguyên","Từ thế kỷ XV đến thế kỷ XVII sau Công nguyên","Từ thế kỷ XVIII đến thế kỷ XX sau Công nguyên"],a:"A"},
{id:2,type:"verbatim",q:"Triết học ra đời ở những khu vực văn minh lớn nào?",o:["Chỉ tại Tây Âu và Bắc Mỹ thời cận đại","Cả phương Đông và phương Tây thời cổ đại","Chỉ tại La Mã và Ai Cập thời trung cổ","Chỉ tại Hy Lạp và Đức thời hiện đại"],a:"B"},
{id:3,type:"verbatim",q:"Theo giáo trình, triết học có những nguồn gốc cơ bản nào?",o:["Nguồn gốc thần thoại và nguồn gốc nghệ thuật","Nguồn gốc chính trị và nguồn gốc tôn giáo","Nguồn gốc nhận thức và nguồn gốc xã hội","Nguồn gốc sinh học và nguồn gốc ngôn ngữ"],a:"C"},
{id:4,type:"verbatim",q:"Nguồn gốc nhận thức của triết học xuất phát từ nhu cầu nào?",o:["Nhu cầu giải trí, tưởng tượng và sáng tác văn học","Nhu cầu tổ chức nghi lễ trong cộng đồng tôn giáo","Nhu cầu trao đổi hàng hóa giữa các quốc gia cổ đại","Nhu cầu hiểu biết thế giới một cách khái quát"],a:"D"},
{id:5,type:"verbatim",q:"Trước khi triết học xuất hiện, con người thường giải thích thế giới bằng gì?",o:["Huyền thoại, tôn giáo sơ khai và tri thức rời rạc","Thí nghiệm hiện đại, toán học cao cấp và dữ liệu lớn","Khoa học chuyên ngành, thống kê và kỹ thuật số","Công nghệ tự động, mạng máy tính và trí tuệ nhân tạo"],a:"A"},
{id:6,type:"verbatim",q:"Triết học ra đời khi tư duy con người đạt đến trình độ nào?",o:["Chỉ biết ghi nhớ kinh nghiệm hằng ngày đơn lẻ","Biết trừu tượng hóa, khái quát hóa và hệ thống hóa","Chỉ biết dựa vào cảm xúc và những niềm tin mơ hồ","Biết phủ nhận hoàn toàn mọi tri thức thực nghiệm"],a:"B"},
{id:7,type:"verbatim",q:"Nguồn gốc xã hội của triết học gắn với điều kiện nào?",o:["Xã hội chưa có lao động và chưa có ngôn ngữ","Xã hội chưa hình thành cộng đồng người ổn định","Xã hội có phân công lao động và xuất hiện giai cấp","Xã hội đã xóa bỏ toàn bộ các quan hệ sản xuất"],a:"C"},
{id:8,type:"verbatim",q:"Theo giáo trình, khi xã hội có giai cấp thì triết học mang dấu ấn gì?",o:["Hoàn toàn không còn liên quan đến lợi ích xã hội","Chỉ phản ánh đời sống sinh học của cá nhân","Không chịu ảnh hưởng bởi lập trường xã hội nào","Mang tính giai cấp và phục vụ lợi ích nhất định"],a:"D"},
{id:9,type:"verbatim",q:"Thuật ngữ 'triết gia' theo giáo trình xuất hiện đầu tiên ở đâu?",o:["Ở Heraclitus, dùng để chỉ người nghiên cứu bản chất","Ở Kant, dùng để chỉ người xây dựng khoa học mới","Ở Hegel, dùng để chỉ người phủ nhận duy vật","Ở Darwin, dùng để chỉ nhà nghiên cứu sinh học"],a:"A"},
{id:10,type:"verbatim",q:"Ở Trung Quốc, chữ 'triết' thường được hiểu gần với ý nghĩa nào?",o:["Sự cầu nguyện trong các nghi lễ tôn giáo","Sự truy tìm bản chất bằng trí tuệ sâu sắc","Sự mô tả kinh nghiệm sản xuất hằng ngày","Sự ghi chép lịch sử của các triều đại"],a:"B"},
{id:11,type:"verbatim",q:"Ở Ấn Độ, thuật ngữ Darshana trong triết học có nghĩa gì?",o:["Sự tính toán bằng các mô hình hình học","Sự mô tả tự nhiên bằng con số chính xác","Sự chiêm ngưỡng và suy ngẫm đến lẽ phải","Sự quản lý nhà nước theo luật pháp cổ đại"],a:"C"},
{id:12,type:"verbatim",q:"Ở phương Tây, philosophia có nghĩa gốc gần nhất là gì?",o:["Tình yêu đối với quyền lực chính trị tuyệt đối","Sự tuân phục với các giáo điều tôn giáo","Niềm tin vào những truyền thuyết dân gian","Yêu mến sự thông thái và tìm kiếm chân lý"],a:"D"},
{id:13,type:"verbatim",q:"Triết học được xem là loại hình tri thức như thế nào?",o:["Loại hình tri thức đặc biệt, khái quát và lý luận","Loại tri thức cảm tính, rời rạc và không logic","Loại tri thức chỉ dùng trong nghi lễ tôn giáo","Loại tri thức chỉ phục vụ sản xuất thủ công"],a:"A"},
{id:14,type:"verbatim",q:"Theo giáo trình, triết học giải thích thế giới nhằm tìm ra điều gì?",o:["Những sự kiện ngẫu nhiên không có quy luật","Những quy luật phổ biến nhất của thế giới","Những câu chuyện huyền thoại về thần linh","Những cảm xúc chủ quan của từng cá nhân"],a:"B"},
{id:15,type:"verbatim",q:"Triết học khác với khoa học cụ thể chủ yếu ở điểm nào?",o:["Triết học chỉ ghi nhớ dữ kiện, không lý luận","Triết học chỉ nghiên cứu một ngành rất hẹp","Triết học có tính khái quát cao về thế giới","Triết học không liên quan đến tư duy con người"],a:"C"},
{id:16,type:"verbatim",q:"Theo Mác - Lênin, triết học nghiên cứu những quy luật nào?",o:["Quy luật riêng của từng ngành kỹ thuật cụ thể","Quy luật riêng của từng hiện tượng sinh học","Quy luật riêng của một quốc gia nhất định","Quy luật chung nhất của tự nhiên, xã hội, tư duy"],a:"D"},
{id:17,type:"verbatim",q:"Đối tượng của triết học là những quan hệ và quy luật nào?",o:["Quan hệ phổ biến và quy luật chung nhất toàn bộ tự nhiên, xã hội, tư duy","Quan hệ riêng biệt và quy luật hẹp của một ngành nghề thủ công","Quan hệ cảm tính và niềm tin riêng của từng cá nhân cụ thể","Quan hệ ngẫu nhiên và sự kiện rời rạc trong đời sống hằng ngày"],a:"A"},
{id:18,type:"verbatim",q:"Thời cổ đại, triết học thường được xem như hình thức tri thức nào?",o:["Tri thức riêng của một ngành thực nghiệm nhỏ","Hình thức cao nhất, bao quát nhiều lĩnh vực","Tín ngưỡng dân gian không có tính lý luận","Kỹ thuật sản xuất thuần túy của nông dân"],a:"B"},
{id:19,type:"verbatim",q:"Ở Tây Âu trung cổ, triết học chủ yếu bị chi phối bởi lĩnh vực nào?",o:["Kinh tế thị trường và kỹ thuật công nghiệp","Toán học hiện đại và vật lý lượng tử","Giáo hội và hệ tư tưởng thần học Kitô giáo","Chính trị dân chủ và khoa học thực nghiệm"],a:"C"},
{id:20,type:"verbatim",q:"Triết học kinh viện thời trung cổ thường nghiên cứu nội dung nào?",o:["Những quy luật khách quan của kinh tế hiện đại","Những vấn đề sản xuất vật chất của công nhân","Những phương pháp thực nghiệm của khoa học mới","Những vấn đề nặng về tư biện và thần học"],a:"D"},
{id:21,type:"verbatim",q:"Từ thế kỷ XV - XVI, khoa học Tây Âu phát triển sau sự kiện nào?",o:["Cuộc cách mạng Copernicus trong nhận thức thiên văn","Sự sụp đổ hoàn toàn của mọi ngành khoa học","Sự biến mất của các ngành khoa học tự nhiên","Việc thần học thay thế toàn bộ tri thức thực nghiệm"],a:"A"},
{id:22,type:"verbatim",q:"Thời cận đại, các khoa học cụ thể có xu hướng như thế nào?",o:["Mất hoàn toàn đối tượng nghiên cứu độc lập","Tách dần khỏi triết học và phát triển riêng","Phụ thuộc tuyệt đối vào thần học kinh viện","Không còn tạo ảnh hưởng đến tư tưởng xã hội"],a:"B"},
{id:23,type:"verbatim",q:"Hegel từng thể hiện tham vọng nào về triết học?",o:["Triết học chỉ là cảm xúc không cần hệ thống","Triết học không cần liên hệ với khoa học nào","Triết học là một hệ thống nhận thức phổ biến","Triết học chỉ nghiên cứu một hiện tượng nhỏ"],a:"C"},
{id:24,type:"verbatim",q:"Triết học Mác xác định đối tượng nghiên cứu bằng cách nào?",o:["Xem triết học thay thế toàn bộ khoa học cụ thể","Xem triết học chỉ phục vụ các nghi lễ tôn giáo","Xem triết học là ghi chép cảm xúc cá nhân","Tiếp tục giải quyết quan hệ tư duy và tồn tại"],a:"D"},
{id:25,type:"verbatim",q:"Thế giới quan được hiểu khái quát là gì?",o:["Hệ thống quan điểm của con người về thế giới và vị trí của mình","Danh sách các sự kiện lịch sử được ghi chép theo thời gian","Tập hợp các công thức tính toán trong khoa học tự nhiên","Một phương pháp kỹ thuật riêng trong sản xuất công nghiệp"],a:"A"},
{id:26,type:"verbatim",q:"Khái niệm Weltanschauung có nguồn gốc từ ngôn ngữ nào?",o:["Tiếng Hy Lạp cổ đại trong triết học Platon","Tiếng Đức trong truyền thống triết học châu Âu","Tiếng Latin cổ dùng trong thần học trung cổ","Tiếng Sanskrit trong các trường phái Ấn Độ"],a:"B"},
{id:27,type:"verbatim",q:"Trong thế giới quan, thành phần chủ yếu gồm những yếu tố nào?",o:["Cảm xúc, tập quán và ngẫu nhiên cá nhân","Thần thoại, nghi lễ và tín ngưỡng cổ xưa","Tri thức, niềm tin và lý tưởng sống","Quyền lực, pháp luật và hình phạt xã hội"],a:"C"},
{id:28,type:"verbatim",q:"Tri thức chỉ gia nhập thế giới quan khi nào?",o:["Khi nó chỉ dừng lại ở thông tin chưa kiểm nghiệm","Khi nó bị tách khỏi thực tiễn và niềm tin","Khi nó hoàn toàn không ảnh hưởng hành động","Khi được kiểm nghiệm và trở thành niềm tin"],a:"D"},
{id:29,type:"verbatim",q:"Các hình thức thế giới quan được nêu trong giáo trình gồm nhóm nào?",o:["Thần thoại, tôn giáo, khoa học và triết học","Chỉ kinh nghiệm cá nhân và phong tục địa phương","Chỉ thế giới quan tôn giáo và thần thoại cổ","Chỉ thế giới quan khoa học thực nghiệm hiện đại"],a:"A"},
{id:30,type:"verbatim",q:"Thế giới quan phổ biến nhất trong đời sống và khoa học là gì?",o:["Thế giới quan thần thoại thời cổ sơ","Thế giới quan triết học ở trình độ lý luận","Thế giới quan tôn giáo trong nghi lễ","Thế giới quan kinh nghiệm thông thường"],a:"B"},
{id:31,type:"verbatim",q:"Vì sao triết học là hạt nhân lý luận của thế giới quan?",o:["Vì triết học không liên quan đến nhận thức","Vì triết học chỉ là thói quen sinh hoạt","Vì triết học đưa ra quan điểm chung nhất","Vì triết học chỉ mô tả một sự kiện riêng"],a:"C"},
{id:32,type:"verbatim",q:"Thế giới quan duy vật biện chứng bao gồm những thành tố nào?",o:["Niềm tin tôn giáo và các giáo điều huyền bí","Tư duy thần thoại và truyền thuyết dân gian","Kinh nghiệm cá nhân và cảm nhận tự phát","Tri thức khoa học, niềm tin khoa học, lý tưởng cách mạng"],a:"D"},
{id:33,type:"verbatim",q:"Theo giáo trình, thế giới quan có vai trò đầu tiên nào?",o:["Giúp con người xác định vấn đề và tìm lời giải đáp","Làm con người từ bỏ hoàn toàn hoạt động nhận thức","Thay thế mọi phương pháp nghiên cứu khoa học cụ thể","Tách con người khỏi đời sống xã hội hiện thực"],a:"A"},
{id:34,type:"verbatim",q:"Thế giới quan là tiền đề quan trọng để xác lập điều gì?",o:["Các nghi lễ thần thoại trong cộng đồng cổ đại","Phương thức tư duy hợp lý và nhân sinh quan tích cực","Những cảm xúc tạm thời và kinh nghiệm rời rạc","Các dữ kiện riêng lẻ không có giá trị định hướng"],a:"B"},
{id:35,type:"verbatim",q:"Trình độ phát triển của thế giới quan là tiêu chí đánh giá điều gì?",o:["Sự giàu có vật chất của từng cá nhân riêng lẻ","Số lượng tài liệu mà một người đã ghi nhớ","Sự trưởng thành của cá nhân và cộng đồng xã hội","Khả năng tuân theo mọi thói quen truyền thống"],a:"C"},
{id:36,type:"verbatim",q:"Giáo trình nhận xét hạn chế của thế giới quan tôn giáo là gì?",o:["Luôn lấy tri thức khoa học làm tiêu chuẩn tối cao","Luôn kiểm chứng mọi niềm tin bằng thực nghiệm","Luôn phủ nhận hoàn toàn các yếu tố tín ngưỡng","Đặt niềm tin cao hơn lý trí và dễ sai lầm"],a:"D"},

{id:37,type:"inference",q:"Vì sao triết học không thể xuất hiện khi tri thức còn rời rạc?",o:["Vì triết học cần năng lực khái quát, hệ thống hóa và lý luận hóa","Vì triết học chỉ cần niềm tin cảm tính, không cần lý luận","Vì triết học chỉ hình thành trong xã hội không có ngôn ngữ","Vì triết học chỉ xuất hiện khi khoa học hoàn toàn biến mất"],a:"A"},
{id:38,type:"inference",q:"Nguồn gốc nhận thức và nguồn gốc xã hội khác nhau ở điểm nào?",o:["Nguồn gốc nhận thức nói về giai cấp, nguồn gốc xã hội nói về tư duy","Nguồn gốc nhận thức nói về nhu cầu hiểu biết, nguồn gốc xã hội nói về điều kiện xã hội","Nguồn gốc nhận thức chỉ nói về nhà nước, nguồn gốc xã hội chỉ nói về thần thoại","Nguồn gốc nhận thức và nguồn gốc xã hội hoàn toàn đồng nhất với nhau"],a:"B"},
{id:39,type:"inference",q:"Vì sao sự xuất hiện tầng lớp trí thức có ý nghĩa với sự ra đời triết học?",o:["Vì tầng lớp trí thức chỉ làm lao động chân tay đơn giản","Vì tầng lớp trí thức không cần bất kỳ tri thức nào","Vì họ có điều kiện tổng hợp, hệ thống hóa và lý luận hóa tri thức","Vì họ làm cho mọi tri thức khoa học bị mất đi hoàn toàn"],a:"C"},
{id:40,type:"inference",q:"Nếu một xã hội chưa có phân công lao động và tri thức chuyên biệt, triết học khó ra đời vì sao?",o:["Vì xã hội đó đã có đủ hệ thống khoa học chuyên ngành","Vì xã hội đó đã vượt qua mọi nhu cầu nhận thức chung","Vì xã hội đó không còn quan hệ giữa người với tự nhiên","Vì chưa có điều kiện xã hội cho tư duy lý luận chuyên sâu"],a:"D"},
{id:41,type:"inference",q:"Điểm chung trong cách hiểu triết học ở Đông và Tây là gì?",o:["Đều gắn với trí tuệ, suy ngẫm và tìm kiếm chân lý","Đều chỉ coi triết học là nghi lễ thờ cúng thần linh","Đều phủ nhận hoàn toàn khả năng nhận thức lý luận","Đều xem triết học là kỹ thuật sản xuất thủ công"],a:"A"},
{id:42,type:"inference",q:"Khi nói triết học có tính trừu tượng cao, nên hiểu thế nào?",o:["Triết học chỉ nói những điều mơ hồ và vô nghĩa","Triết học khái quát từ nhiều hiện tượng để tìm cái chung","Triết học chỉ sao chép kinh nghiệm rời rạc hằng ngày","Triết học từ chối mọi hình thức suy luận logic"],a:"B"},
{id:43,type:"inference",q:"Vì sao triết học không đồng nhất với các khoa học cụ thể?",o:["Vì triết học chỉ nghiên cứu một đối tượng nhỏ như sinh học","Vì triết học không có bất kỳ phương pháp suy nghĩ nào","Vì triết học nghiên cứu vấn đề chung nhất, không thay thế khoa học riêng","Vì triết học chỉ là cảm xúc cá nhân và niềm tin tôn giáo"],a:"C"},
{id:44,type:"inference",q:"Nói 'triết học là khoa học của mọi khoa học' có hạn chế gì?",o:["Làm triết học trở thành môn học hoàn toàn vô nghĩa","Làm khoa học tự nhiên không còn đối tượng nghiên cứu","Làm xã hội không còn cần đến thế giới quan khoa học","Dễ biến triết học thành hệ thống bao trùm thay khoa học cụ thể"],a:"D"},
{id:45,type:"inference",q:"Vì sao triết học thời cổ đại từng bao quát nhiều lĩnh vực?",o:["Vì các khoa học chuyên ngành chưa tách ra độc lập rõ ràng","Vì thời cổ đại đã có đầy đủ khoa học hiện đại ngày nay","Vì triết học cổ đại chỉ phục vụ một giáo hội duy nhất","Vì con người cổ đại không có nhu cầu nhận thức thế giới"],a:"A"},
{id:46,type:"inference",q:"Sự phát triển của khoa học chuyên ngành ảnh hưởng thế nào đến triết học?",o:["Làm triết học tự nhiên cũ dần mất vai trò bao trùm mọi tri thức","Làm triết học trở thành ngành thay thế toàn bộ khoa học cụ thể","Làm triết học biến mất khỏi mọi hoạt động nhận thức xã hội","Làm triết học chỉ còn là nghi lễ tôn giáo và thần thoại"],a:"B"},
{id:47,type:"inference",q:"Triết học Mác xác định lại vai trò của triết học như thế nào?",o:["Triết học thay thế toàn bộ vật lý, sinh học và kinh tế học","Triết học chỉ nghiên cứu niềm tin tôn giáo của cộng đồng","Triết học nghiên cứu quy luật chung và định hướng phương pháp luận","Triết học không cần liên hệ với khoa học hoặc thực tiễn"],a:"C"},
{id:48,type:"inference",q:"Nếu một người chỉ nhìn sự kiện riêng lẻ mà không tìm cái chung, người đó thiếu điều gì?",o:["Thiếu khả năng mô tả cảm giác cá nhân tạm thời","Thiếu niềm tin tuyệt đối vào truyền thuyết cổ đại","Thiếu kỹ năng ghi nhớ các câu chuyện dân gian","Thiếu năng lực khái quát mang tính triết học"],a:"D"},
{id:49,type:"inference",q:"Vì sao thế giới quan quan trọng đối với hành động của con người?",o:["Vì cách nhìn thế giới định hướng thái độ, giá trị và hành vi thực tiễn","Vì thế giới quan chỉ là trang trí ngôn ngữ không ảnh hưởng hành động","Vì thế giới quan luôn khiến con người từ bỏ nhận thức khoa học","Vì thế giới quan chỉ tồn tại trong sách vở, không gắn đời sống"],a:"A"},
{id:50,type:"inference",q:"Nếu tri thức chưa trở thành niềm tin, nó chưa có vai trò gì?",o:["Chưa trở thành cơ sở định hướng ổn định trong thế giới quan","Chưa được ghi nhớ như một thông tin rời rạc trong đầu","Chưa xuất hiện dưới dạng ngôn ngữ trong đời sống xã hội","Chưa bị loại bỏ khỏi mọi hoạt động nhận thức khoa học"],a:"B"},
{id:51,type:"inference",q:"Thế giới quan triết học khác thế giới quan thông thường ở điểm nào?",o:["Nó chỉ dựa vào thói quen và kinh nghiệm tự phát hằng ngày","Nó không có khả năng định hướng hành động của con người","Nó có tính lý luận, khái quát, hệ thống và logic cao hơn","Nó chỉ phù hợp với cảm xúc nhất thời của từng cá nhân"],a:"C"},
{id:52,type:"inference",q:"Vì sao triết học được gọi là hạt nhân lý luận của thế giới quan?",o:["Vì triết học loại bỏ hoàn toàn mọi hình thức thế giới quan","Vì triết học chỉ phục vụ niềm tin tín ngưỡng cá nhân","Vì triết học không có tác động đến quan điểm sống","Vì triết học cung cấp cơ sở lý luận chung nhất cho thế giới quan"],a:"D"},
{id:53,type:"inference",q:"Một người tin mọi sự do số phận quyết định thường gần với kiểu thế giới quan nào?",o:["Thế giới quan tôn giáo hoặc định mệnh, ít nhấn mạnh nguyên nhân khách quan","Thế giới quan khoa học, phân tích điều kiện và quy luật khách quan","Thế giới quan duy vật biện chứng, chú trọng mối liên hệ thực tiễn","Thế giới quan triết học khoa học, đề cao kiểm nghiệm bằng thực tiễn"],a:"A"},
{id:54,type:"inference",q:"Một người phân tích thất bại bằng nguyên nhân, điều kiện và cách sửa thường thể hiện gì?",o:["Lối nhìn mê tín, phó mặc mọi thứ cho số phận","Cách nhìn có xu hướng khoa học và thực tiễn hơn","Quan điểm phủ nhận mọi khả năng cải tạo hiện thực","Tư duy thần thoại, không cần kiểm chứng sự kiện"],a:"B"},
{id:55,type:"inference",q:"Thế giới quan duy vật biện chứng được xem cao vì lý do nào?",o:["Dựa trên niềm tin tôn giáo và phủ nhận tri thức khoa học","Dựa vào cảm xúc cá nhân và truyền thuyết dân gian","Dựa trên khoa học, duy vật, biện chứng và thực tiễn","Dựa vào trực giác tự phát và kinh nghiệm riêng lẻ"],a:"C"},
{id:56,type:"inference",q:"Hạn chế cơ bản của thế giới quan tôn giáo trong giáo trình là gì?",o:["Nó luôn bắt buộc con người nghiên cứu khoa học kỹ lưỡng","Nó luôn kiểm tra mọi nhận định bằng thực tiễn khách quan","Nó luôn đặt lý trí khoa học cao hơn mọi niềm tin cá nhân","Nó dễ đặt niềm tin lên trên lý trí và tri thức khoa học"],a:"D"},
{id:57,type:"inference",q:"Câu 'không học triết học không có nghĩa là không có triết học' hàm ý gì?",o:["Ai cũng bị chi phối bởi một cách nhìn và hệ quan niệm nào đó","Triết học chỉ tồn tại với người học chuyên ngành triết học","Người không học triết học không bao giờ có quan điểm sống","Triết học không liên quan đến đời sống và hành động"],a:"A"},
{id:58,type:"inference",q:"Theo cách hiểu của giáo trình, triết học tốt giúp con người điều gì?",o:["Tránh mọi hoạt động nhận thức và hành động xã hội","Định hướng tư duy, hành vi và xử lý vấn đề tốt hơn","Tin vào mọi nguyên nhân siêu nhiên chưa kiểm chứng","Từ bỏ hoàn toàn vai trò của tri thức khoa học"],a:"B"},
{id:59,type:"inference",q:"Vì sao nhà khoa học cũng cần quan điểm triết học đúng?",o:["Vì khoa học chỉ dựa vào mê tín và kinh nghiệm mơ hồ","Vì triết học thay thế mọi phương pháp thí nghiệm cụ thể","Vì quan điểm triết học định hướng cách hiểu và phương pháp nghiên cứu","Vì nhà khoa học không cần dữ liệu hoặc phương pháp kiểm chứng"],a:"C"},
{id:60,type:"inference",q:"Quan điểm triết học sai có thể gây tác hại gì với nhận thức khoa học?",o:["Làm tăng tính khách quan và độ tin cậy của nghiên cứu","Làm mọi ngành khoa học phát triển không cần phương pháp","Làm tri thức tự động đúng mà không cần kiểm nghiệm","Làm nhận thức lệch hướng và giải thích sai hiện tượng"],a:"D"},
{id:61,type:"inference",q:"Nếu hỏi 'triết học là gì' theo Mác - Lênin, yếu tố nào phải có?",o:["Hệ thống quan điểm chung nhất và quy luật chung nhất của tự nhiên, xã hội, tư duy","Danh sách kinh nghiệm lao động hằng ngày không có tính khái quát lý luận","Tập hợp nghi lễ tôn giáo nhằm giải thích thế giới bằng thần linh","Một ngành khoa học riêng chỉ nghiên cứu cấu tạo tế bào sinh vật"],a:"A"},
{id:62,type:"inference",q:"Nếu đề yêu cầu 'nguồn gốc nhận thức', nên nhấn mạnh ý nào?",o:["Sự xuất hiện nhà nước và phân chia giai cấp xã hội","Nhu cầu nhận thức thế giới ở trình độ khái quát và lý luận","Sự thống trị tuyệt đối của thần học trong thời trung cổ","Sự ra đời của các thiết bị máy móc công nghiệp hiện đại"],a:"B"},
{id:63,type:"inference",q:"Nếu đề yêu cầu 'nguồn gốc xã hội', nên nhấn mạnh ý nào?",o:["Nhu cầu con người muốn giải thích vũ trụ bằng tư duy trừu tượng","Sự phát triển của ngôn ngữ trong hoạt động giao tiếp hằng ngày","Phân công lao động, giai cấp, nhà nước và tầng lớp trí thức","Sự xuất hiện của các truyền thuyết và thần thoại trong dân gian"],a:"C"},
{id:64,type:"inference",q:"Điểm nào sau đây không phù hợp khi nói về triết học Mác - Lênin?",o:["Nghiên cứu quy luật chung nhất của xã hội và tư duy","Giải quyết quan hệ giữa vật chất và ý thức","Gắn với thế giới quan và phương pháp luận khoa học","Thay thế mọi khoa học cụ thể bằng một học thuyết duy nhất"],a:"D"},
{id:65,type:"inference",q:"Tại sao nói triết học có tác động đến đạo đức, pháp luật và lối sống?",o:["Vì quan niệm chung về thế giới chi phối quan niệm giá trị và hành động","Vì triết học chỉ là môn học ghi nhớ, không liên quan thực tiễn","Vì triết học luôn tách rời các lĩnh vực xã hội và con người","Vì triết học chỉ nghiên cứu công thức toán học chuyên ngành"],a:"A"},
{id:66,type:"inference",q:"Nếu một tri thức đã được kiểm nghiệm và trở thành niềm tin, nó có thể trở thành gì?",o:["Một dữ kiện rời rạc không ảnh hưởng nhận thức","Một yếu tố cấu thành thế giới quan của con người","Một cảm xúc tạm thời không định hướng hành động","Một hiện tượng hoàn toàn ngoài đời sống xã hội"],a:"B"},
{id:67,type:"inference",q:"Khi giáo trình nói triết học xuất hiện thay thế tư duy huyền thoại, nên hiểu là gì?",o:["Triết học xóa bỏ mọi nhu cầu hiểu biết của con người","Triết học quay lại hoàn toàn với tín ngưỡng sơ khai","Triết học dùng tư duy lý luận để giải thích thế giới hệ thống hơn","Triết học chỉ sao chép nguyên vẹn các câu chuyện thần thoại"],a:"C"},
{id:68,type:"inference",q:"Vì sao thế giới quan là tiêu chí đánh giá sự trưởng thành?",o:["Vì nó chỉ đo lượng thông tin một người ghi nhớ máy móc","Vì nó chỉ phản ánh mức thu nhập của một cá nhân cụ thể","Vì nó không hề liên quan đến thái độ và lý tưởng sống","Vì nó thể hiện trình độ nhận thức, giá trị và định hướng sống"],a:"D"},
{id:69,type:"inference",q:"Trong bài thi, nếu phải nêu khái niệm thế giới quan, cần có nội dung nào?",o:["Quan điểm về thế giới, con người, vị trí con người và cuộc sống","Danh mục các sự kiện lịch sử không có mối liên hệ nội tại","Các công thức kỹ thuật chỉ áp dụng trong một ngành nghề","Các nghi lễ tôn giáo tách rời đời sống nhận thức xã hội"],a:"A"},

let answers=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");let onlyLeft=false;
const root=document.getElementById("root"),search=document.getElementById("search"),kind=document.getElementById("kind"),btnLeft=document.getElementById("unanswered"),btnCopy=document.getElementById("copy"),btnReset=document.getElementById("reset");
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(answers))}
function stats(){const total=questions.length,done=questions.filter(q=>answers[q.id]).length,left=total-done,p=Math.round(done/total*100);document.getElementById("total").textContent=total;document.getElementById("done").textContent=done;document.getElementById("left").textContent=left;document.getElementById("percent").textContent=p+"%";document.getElementById("fill").style.width=p+"%"}
function filtered(){const s=norm(search.value.trim()),k=kind.value;return questions.filter(q=>(k==="all"||q.type===k)&&(!s||norm(q.q+" "+q.o.join(" ")).includes(s))&&(!onlyLeft||!answers[q.id]))}
function render(){stats();const arr=filtered();root.innerHTML="";if(!arr.length){root.innerHTML='<section class="panel empty">Không có câu hỏi phù hợp với bộ lọc hiện tại.</section>';return}const groups=[["Verbatim Questions","Bám sát nội dung giáo trình",arr.filter(q=>q.type==="verbatim")],["Inference Questions","Hỏi suy luận và hiểu bản chất",arr.filter(q=>q.type==="inference")]];groups.forEach(([title,sub,items])=>{if(!items.length)return;const sec=document.createElement("section");sec.innerHTML=`<h2>${title}<span class="badge">${items.length} câu</span></h2>`;items.forEach(q=>{const card=document.createElement("article");card.className="qcard"+(answers[q.id]?" answered":"");card.innerHTML=`<div class="qhead"><div class="qno">Câu ${q.id}</div><div class="qtype">${q.type==="verbatim"?"Bám sát giáo trình":"Suy luận"}</div></div><div class="qtext">${q.q}</div><div class="opts">${q.o.map((x,i)=>{const L="ABCD"[i],sel=answers[q.id]===L;return `<label class="opt ${sel?"selected":""}"><input type="radio" name="q${q.id}" value="${L}" ${sel?"checked":""}/><span><strong>${L}.</strong> ${x}</span></label>`}).join("")}</div>`;card.querySelectorAll("input").forEach(inp=>inp.onchange=e=>{answers[q.id]=e.target.value;save();render()});sec.appendChild(card)});root.appendChild(sec)})}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1700)}
search.oninput=render;kind.onchange=render;btnLeft.onclick=()=>{onlyLeft=!onlyLeft;btnLeft.textContent=onlyLeft?"Hiện tất cả câu":"Lọc câu chưa làm";render()};btnCopy.onclick=async()=>{const text=questions.map(q=>`${q.id}${answers[q.id]||"_"}`).join(", ");try{await navigator.clipboard.writeText(text)}catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove()}toast("Đã copy đáp án của bạn")};btnReset.onclick=()=>{if(!confirm("Xóa toàn bộ đáp án đã chọn?"))return;answers={};save();render();toast("Đã xóa đáp án")};render();
</script>
