  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#64748b;--border:#e2e8f0;--primary:#2563eb;--soft:#dbeafe;--good:#16a34a;--bad:#dc2626;--dark:#0f172a;--warn:#f59e0b;--shadow:0 12px 30px rgba(15,23,42,.08);--radius:18px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;line-height:1.55}header{padding:30px 16px 38px;text-align:center;color:#fff;background:linear-gradient(135deg,#1d4ed8,#7c3aed)}header h1{margin:0 0 8px;font-size:28px}header p{margin:0;opacity:.92}.wrap{max-width:1120px;margin:-24px auto 42px;padding:0 16px}.panel,.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.panel{padding:18px;margin-bottom:18px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.stat{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}.stat b{display:block;color:var(--primary);font-size:23px}.stat span{font-size:13px;color:var(--muted)}.bar{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:13px 0 16px}.fill{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#7c3aed);transition:.2s}.controls{display:grid;grid-template-columns:1.25fr .8fr repeat(4,auto);gap:10px}input,select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;background:#fff;font-size:14px;outline:none}input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}button{border:0;border-radius:12px;padding:11px 14px;background:var(--primary);color:white;font-weight:700;cursor:pointer;white-space:nowrap}button.secondary{background:var(--dark)}button.danger{background:var(--bad)}button.ghost{background:#475569}h2{display:flex;gap:10px;align-items:center;margin:28px 0 12px}.badge{font-size:13px;background:var(--soft);color:#1d4ed8;border-radius:999px;padding:4px 10px}.qcard{padding:18px;margin-bottom:14px;box-shadow:0 8px 18px rgba(15,23,42,.04)}.qcard.answered{border-color:#93c5fd;background:#fbfdff}.qhead{display:flex;justify-content:space-between;gap:12px;margin-bottom:10px}.qno{font-weight:800;color:var(--primary)}.qtype{font-size:12px;color:var(--muted);background:#f1f5f9;border-radius:999px;padding:4px 9px;white-space:nowrap}.qtext{font-size:16px;font-weight:700;margin-bottom:12px}.opts{display:grid;gap:9px}.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border:1px solid var(--border);border-radius:13px;background:#fff;cursor:pointer;transition:.15s}.opt:hover{border-color:#93c5fd;background:#f8fbff}.opt input{margin-top:3px}.opt.selected{border-color:var(--primary);background:var(--soft)}.opt.correct{border-color:#86efac;background:#f0fdf4}.opt.wrong{border-color:#fecaca;background:#fef2f2}.feedback{display:none;margin-top:12px;border-radius:14px;padding:12px 13px;border:1px solid var(--border);background:#f8fafc}.feedback.show{display:block}.feedback.good{border-color:#86efac;background:#f0fdf4}.feedback.bad{border-color:#fecaca;background:#fef2f2}.feedback b.good{color:var(--good)}.feedback b.bad{color:var(--bad)}.empty{text-align:center;color:var(--muted);padding:28px}.toast{position:fixed;right:18px;bottom:18px;background:#111827;color:white;padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.2s;z-index:20}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}.controls{grid-template-columns:1fr}header h1{font-size:23px}}

<body>
<header>
  <h1>LISTCH - Vấn đề cơ bản của triết học</h1>
  <p>Vật chất - Ý thức • Duy vật - Duy tâm • Khả tri - Bất khả tri • Biện chứng - Siêu hình</p>
</header>
<main class="wrap">
  <section class="panel">
    <div class="stats">
      <div class="stat"><b id="total">0</b><span>Tổng câu</span></div>
      <div class="stat"><b id="done">0</b><span>Đã làm</span></div>
      <div class="stat"><b id="left">0</b><span>Chưa làm</span></div>
      <div class="stat"><b id="right">0</b><span>Đúng</span></div>
      <div class="stat"><b id="percent">0%</b><span>Tiến độ</span></div>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="controls">
      <input id="search" type="search" placeholder="Tìm câu hỏi: duy vật, duy tâm, khả tri, siêu hình, biện chứng..." />
      <select id="kind">
        <option value="all">Tất cả phần</option>
        <option value="verbatim">Verbatim Questions</option>
        <option value="inference">Inference Questions</option>
      </select>
      <button id="unanswered">Lọc câu chưa làm</button>
      <button class="ghost" id="wrongOnly">Lọc câu sai</button>
      <button class="secondary" id="copy">Copy đáp án</button>
      <button class="danger" id="reset">Xóa làm lại</button>
    </div>
  </section>
  <div id="root"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY="LISTCH_TrietHocMacLenin_VDCB_DVDT_BC_v2";
const questions=[
{id:1,type:"verbatim",q:"Vấn đề cơ bản của triết học được giáo trình xác định là gì?",o:["Mối quan hệ giữa vật chất và ý thức","Mối quan hệ giữa kinh tế và chính trị","Mối quan hệ giữa đạo đức và pháp luật","Mối quan hệ giữa cá nhân và tập thể"],a:"A",ex:"Vấn đề cơ bản là quan hệ giữa vật chất và ý thức, hay tồn tại và tư duy. Các quan hệ còn lại chỉ là vấn đề cụ thể trong đời sống xã hội."},
{id:2,type:"verbatim",q:"Ph.Ăngghen gọi vấn đề cơ bản của triết học hiện đại là quan hệ nào?",o:["Quan hệ giữa tôn giáo và nghệ thuật","Quan hệ giữa tư duy và tồn tại","Quan hệ giữa dân tộc và nhà nước","Quan hệ giữa tự do và trách nhiệm"],a:"B",ex:"Ăngghen nêu vấn đề cơ bản là quan hệ giữa tư duy và tồn tại. Các phương án khác không phải cách gọi kinh điển của vấn đề cơ bản triết học."},
{id:3,type:"verbatim",q:"Mặt thứ nhất của vấn đề cơ bản triết học hỏi điều gì?",o:["Con người có thể nhận thức được thế giới không","Tôn giáo có vai trò thế nào trong đời sống","Vật chất hay ý thức cái nào có trước","Khoa học tự nhiên phát triển bằng cách nào"],a:"C",ex:"Mặt thứ nhất hỏi vật chất và ý thức cái nào có trước, cái nào quyết định. Các ý khác thuộc nhận thức luận hoặc vấn đề xã hội riêng."},
{id:4,type:"verbatim",q:"Mặt thứ hai của vấn đề cơ bản triết học hỏi điều gì?",o:["Vật chất hay ý thức cái nào quyết định","Giai cấp nào giữ vai trò thống trị xã hội","Phép biện chứng ra đời từ thời kỳ nào","Con người có thể nhận thức thế giới không"],a:"D",ex:"Mặt thứ hai hỏi khả năng nhận thức thế giới của con người. Mặt thứ nhất mới hỏi vật chất và ý thức cái nào quyết định."},
{id:5,type:"verbatim",q:"Chủ nghĩa duy vật khẳng định quan hệ nào giữa vật chất và ý thức?",o:["Vật chất có trước, ý thức có sau","Ý thức có trước, vật chất có sau","Hai yếu tố độc lập và ngang bằng","Không thể bàn về hai yếu tố này"],a:"A",ex:"Duy vật cho rằng vật chất có trước và quyết định ý thức. Các lựa chọn còn lại nghiêng về duy tâm, nhị nguyên hoặc bất khả tri."},
{id:6,type:"verbatim",q:"Chủ nghĩa duy tâm khẳng định điều gì là cái có trước?",o:["Vật chất tự nhiên là cái có trước","Ý thức, tinh thần là cái có trước","Quan hệ sản xuất là cái có trước","Kinh nghiệm cảm tính là cái có trước"],a:"B",ex:"Duy tâm xem ý thức hoặc tinh thần là cái có trước và quyết định vật chất. Các phương án còn lại không phản ánh lập trường duy tâm."},
{id:7,type:"verbatim",q:"Chủ nghĩa duy vật giải thích thế giới bằng nguyên nhân nào?",o:["Nguyên nhân siêu nhiên và thần bí","Nguyên nhân tinh thần tuyệt đối","Nguyên nhân vật chất khách quan","Nguyên nhân cảm giác cá nhân"],a:"C",ex:"Duy vật tìm nguyên nhân vật chất khách quan. Nguyên nhân siêu nhiên, tinh thần tuyệt đối hoặc cảm giác cá nhân thuộc khuynh hướng duy tâm."},
{id:8,type:"verbatim",q:"Chủ nghĩa duy tâm giải thích thế giới bằng nguyên nhân nào?",o:["Nguyên nhân vật chất khách quan","Nguyên nhân sinh học thuần túy","Nguyên nhân xã hội thực tiễn","Nguyên nhân tinh thần hoặc ý thức"],a:"D",ex:"Duy tâm quy nguồn gốc thế giới cho tinh thần hoặc ý thức. Các đáp án còn lại không thể hiện lập trường duy tâm."},
{id:9,type:"verbatim",q:"Chủ nghĩa duy vật có mấy hình thức cơ bản trong lịch sử?",o:["Ba hình thức cơ bản","Hai hình thức cơ bản","Bốn hình thức cơ bản","Năm hình thức cơ bản"],a:"A",ex:"Giáo trình nêu ba hình thức: duy vật chất phác, duy vật siêu hình và duy vật biện chứng."},
{id:10,type:"verbatim",q:"Hình thức đầu tiên của chủ nghĩa duy vật là gì?",o:["Chủ nghĩa duy vật biện chứng","Chủ nghĩa duy vật chất phác","Chủ nghĩa duy vật lịch sử","Chủ nghĩa duy vật kinh tế"],a:"B",ex:"Hình thức đầu tiên là duy vật chất phác thời cổ đại. Duy vật biện chứng xuất hiện sau này với Mác, Ăngghen."},
{id:11,type:"verbatim",q:"Chủ nghĩa duy vật chất phác có đặc điểm nhận thức nào?",o:["Trừu tượng cao và có hệ thống khoa học","Hoàn toàn dựa vào thí nghiệm hiện đại","Trực quan, cảm tính và còn mộc mạc","Dựa vào ý niệm tuyệt đối của tinh thần"],a:"C",ex:"Duy vật chất phác còn trực quan, cảm tính, mộc mạc. Nó chưa có cơ sở khoa học hiện đại và không phải duy tâm."},
{id:12,type:"verbatim",q:"Chủ nghĩa duy vật chất phác có điểm tiến bộ nào?",o:["Đồng nhất thế giới với tinh thần tuyệt đối","Phủ nhận sự tồn tại của giới tự nhiên","Tách triết học khỏi mọi hiện tượng vật chất","Lấy tự nhiên để giải thích chính tự nhiên"],a:"D",ex:"Điểm tiến bộ là lấy giới tự nhiên để giải thích thế giới, không viện đến thần linh. Các phương án khác trái với lập trường duy vật."},
{id:13,type:"verbatim",q:"Chủ nghĩa duy vật siêu hình phát triển rõ ở thời kỳ nào?",o:["Thế kỷ XVII đến thế kỷ XVIII","Thế kỷ VIII đến thế kỷ VI trước Công nguyên","Thế kỷ V đến thế kỷ X sau Công nguyên","Thế kỷ XX đến thế kỷ XXI hiện nay"],a:"A",ex:"Duy vật siêu hình phát triển mạnh ở thế kỷ XVII - XVIII, gắn với cơ học cổ điển và khoa học thực nghiệm thời cận đại."},
{id:14,type:"verbatim",q:"Chủ nghĩa duy vật siêu hình thường nhìn thế giới như thế nào?",o:["Như sản phẩm của cảm giác chủ quan","Như một cỗ máy khổng lồ tĩnh tại","Như biểu hiện của ý niệm tuyệt đối","Như điều không thể nhận thức được"],a:"B",ex:"Duy vật siêu hình chịu ảnh hưởng cơ học, nhìn thế giới như cỗ máy gồm bộ phận tách rời. Các ý khác thuộc duy tâm hoặc bất khả tri."},
{id:15,type:"verbatim",q:"Hạn chế lớn của chủ nghĩa duy vật siêu hình là gì?",o:["Luôn đề cao sự vận động và phát triển","Luôn xem xét sự vật trong liên hệ phổ biến","Nhìn sự vật tách rời, máy móc, bất biến","Phủ nhận mọi sự tồn tại của vật chất"],a:"C",ex:"Hạn chế của duy vật siêu hình là máy móc, tĩnh tại, tách rời. Nó không phủ nhận vật chất nhưng chưa nhìn thế giới một cách biện chứng."},
{id:16,type:"verbatim",q:"Hình thức cao nhất của chủ nghĩa duy vật là gì?",o:["Chủ nghĩa duy vật chất phác cổ đại","Chủ nghĩa duy vật siêu hình cận đại","Chủ nghĩa duy vật kinh nghiệm cá nhân","Chủ nghĩa duy vật biện chứng Mácxít"],a:"D",ex:"Duy vật biện chứng là hình thức cao nhất vì khắc phục hạn chế của duy vật cũ và kết hợp duy vật với biện chứng."},
{id:17,type:"verbatim",q:"Chủ nghĩa duy vật biện chứng do ai xây dựng ban đầu?",o:["C. Mác và Ph. Ăngghen","Platon và Aristotle","Hume và Kant","Descartes và Berkeley"],a:"A",ex:"Chủ nghĩa duy vật biện chứng do Mác và Ăngghen xây dựng, sau đó được Lênin phát triển. Các tên còn lại thuộc các truyền thống khác."},
{id:18,type:"verbatim",q:"Chủ nghĩa duy tâm gồm hai hình thức cơ bản nào?",o:["Duy tâm kinh nghiệm và duy tâm lịch sử","Duy tâm chủ quan và duy tâm khách quan","Duy tâm chất phác và duy tâm siêu hình","Duy tâm cổ đại và duy tâm hiện đại"],a:"B",ex:"Giáo trình chia duy tâm thành duy tâm chủ quan và duy tâm khách quan. Các cặp còn lại không phải phân loại cơ bản trong bài."},
{id:19,type:"verbatim",q:"Chủ nghĩa duy tâm chủ quan thừa nhận tính thứ nhất của cái gì?",o:["Vật chất khách quan ngoài con người","Tinh thần khách quan ngoài cá nhân","Ý thức cá nhân của con người","Quan hệ sản xuất của xã hội"],a:"C",ex:"Duy tâm chủ quan đặt ý thức cá nhân lên trước, coi sự vật như phức hợp cảm giác. Những lựa chọn khác không đúng đặc trưng này."},
{id:20,type:"verbatim",q:"Chủ nghĩa duy tâm khách quan thừa nhận cái gì có trước?",o:["Cảm giác riêng của từng cá nhân","Cấu trúc sinh học của cơ thể người","Quan hệ vật chất trong sản xuất","Tinh thần khách quan ngoài con người"],a:"D",ex:"Duy tâm khách quan thừa nhận một tinh thần khách quan tồn tại độc lập với con người. Ý thức cá nhân là duy tâm chủ quan."},
{id:21,type:"verbatim",q:"Tinh thần khách quan trong duy tâm khách quan thường được gọi bằng tên nào?",o:["Ý niệm hoặc tinh thần tuyệt đối","Lao động hoặc phương thức sản xuất","Tế bào hoặc cấu trúc sinh học","Kinh nghiệm hoặc dữ liệu cảm tính"],a:"A",ex:"Duy tâm khách quan thường gọi tinh thần khách quan là ý niệm, tinh thần tuyệt đối, lý tính thế giới. Các ý khác không phải khái niệm trung tâm."},
{id:22,type:"verbatim",q:"Nguồn gốc nhận thức của chủ nghĩa duy tâm bắt nguồn từ đâu?",o:["Việc tuyệt đối hóa một mặt của nhận thức","Việc phủ nhận mọi hoạt động tinh thần","Việc chỉ nghiên cứu quan hệ sản xuất","Việc đồng nhất triết học với toán học"],a:"B",ex:"Duy tâm nảy sinh khi một mặt của nhận thức bị tuyệt đối hóa, thần thánh hóa. Những phương án khác không mô tả nguồn gốc nhận thức này."},
{id:23,type:"verbatim",q:"Nguồn gốc xã hội của chủ nghĩa duy tâm gắn với điều gì?",o:["Sự biến mất hoàn toàn của giai cấp thống trị","Sự phủ nhận toàn bộ lợi ích xã hội","Sự tách rời lao động trí óc và chân tay","Sự phát triển thuần túy của khoa học tự nhiên"],a:"C",ex:"Nguồn gốc xã hội gồm sự tách rời lao động trí óc khỏi lao động chân tay và vai trò của giai cấp thống trị. Các ý khác không đúng trọng tâm."},
{id:24,type:"verbatim",q:"Nhất nguyên luận trong triết học là quan điểm như thế nào?",o:["Thừa nhận hai bản nguyên cùng quyết định thế giới","Phủ nhận mọi nguồn gốc của thế giới hiện thực","Cho rằng thế giới không thể nhận thức được","Thừa nhận một bản nguyên quyết định thế giới"],a:"D",ex:"Nhất nguyên luận chỉ thừa nhận một bản nguyên, có thể là vật chất hoặc tinh thần. Hai bản nguyên là nhị nguyên luận."},
{id:25,type:"verbatim",q:"Nhị nguyên luận thừa nhận thế giới có mấy bản nguyên?",o:["Hai bản nguyên vật chất và tinh thần","Một bản nguyên vật chất duy nhất","Một bản nguyên tinh thần tuyệt đối","Không có bất kỳ bản nguyên nào"],a:"A",ex:"Nhị nguyên luận thừa nhận hai bản nguyên vật chất và tinh thần độc lập. Một bản nguyên là nhất nguyên luận."},
{id:26,type:"verbatim",q:"Descartes được giáo trình nêu là đại biểu của khuynh hướng nào?",o:["Nhất nguyên luận duy vật triệt để","Trường phái nhị nguyên luận","Chủ nghĩa duy vật chất phác","Phép biện chứng duy vật"],a:"B",ex:"Descartes là đại biểu điển hình của nhị nguyên luận trong triết học. Ông không phải nhà duy vật biện chứng."},
{id:27,type:"verbatim",q:"Khả tri luận khẳng định điều gì về nhận thức của con người?",o:["Con người không thể hiểu bản chất sự vật","Con người chỉ biết cảm giác của riêng mình","Con người có thể nhận thức được thế giới","Con người không cần kiểm nghiệm thực tiễn"],a:"C",ex:"Khả tri luận khẳng định con người về nguyên tắc có thể nhận thức được thế giới. Các đáp án khác nghiêng về bất khả tri hoặc chủ quan."},
{id:28,type:"verbatim",q:"Bất khả tri luận phủ nhận điều gì?",o:["Sự tồn tại của hiện tượng cảm tính","Sự tồn tại của con người nhận thức","Sự tồn tại của những tri thức cụ thể","Khả năng nhận thức bản chất thế giới"],a:"D",ex:"Bất khả tri luận phủ nhận hoặc nghi ngờ khả năng nhận thức bản chất thế giới. Nó không nhất thiết phủ nhận mọi tri thức cảm tính."},
{id:29,type:"verbatim",q:"Thuật ngữ bất khả tri luận do ai đưa ra năm 1869?",o:["T. H. Huxley","C. Mác","Ph. Ăngghen","V. I. Lênin"],a:"A",ex:"Thuật ngữ agnosticism được Huxley đưa ra năm 1869. Mác, Ăngghen, Lênin không phải người đặt thuật ngữ này."},
{id:30,type:"verbatim",q:"Hai đại biểu thường gắn với bất khả tri luận là ai?",o:["Platon và Hegel","Hume và Kant","Mác và Ăngghen","Heraclitus và Epicurus"],a:"B",ex:"Giáo trình gắn bất khả tri luận với Hume và Kant. Mác và Ăngghen là người phê phán bất khả tri luận."},
{id:31,type:"verbatim",q:"Theo Kant, con người chỉ nhận thức được dạng nào của sự vật?",o:["Vật tự nó nằm ngoài mọi kinh nghiệm","Thượng đế như nguồn gốc thế giới","Vật cho ta trong kinh nghiệm","Tinh thần tuyệt đối sinh ra tự nhiên"],a:"C",ex:"Kant cho rằng con người chỉ nhận thức được vật cho ta, không nhận thức được vật tự nó. Các phương án khác không đúng luận điểm của Kant."},
{id:32,type:"verbatim",q:"Hoài nghi luận có thái độ như thế nào với tri thức đạt được?",o:["Tin tuyệt đối vào mọi kinh nghiệm cảm tính","Chỉ tin vào các giáo điều tôn giáo","Phủ nhận toàn bộ việc đặt câu hỏi","Nghi ngờ việc đánh giá tri thức đạt được"],a:"D",ex:"Hoài nghi luận nghi ngờ khả năng hoặc độ tin cậy của tri thức. Nó không đồng nghĩa với tin tuyệt đối hoặc phủ nhận mọi đặt câu hỏi."},
{id:33,type:"verbatim",q:"Nguồn gốc ban đầu của từ biện chứng gắn với ý nghĩa nào?",o:["Nghệ thuật tranh luận để tìm chân lý","Kỹ thuật đo đạc hình học trong cổ đại","Nghi lễ cầu nguyện trong tôn giáo","Phương pháp ghi nhớ sự kiện lịch sử"],a:"A",ex:"Ban đầu, biện chứng gắn với nghệ thuật tranh luận, phát hiện mâu thuẫn trong lập luận để tìm chân lý."},
{id:34,type:"verbatim",q:"Trong triết học hiện đại, siêu hình chủ yếu chỉ điều gì?",o:["Phương pháp nhận thức toàn diện và phát triển","Phương pháp tư duy đối lập với biện chứng","Phương pháp đấu tranh để phát hiện chân lý","Phương pháp giải thích bằng mâu thuẫn nội tại"],a:"B",ex:"Trong triết học hiện đại, siêu hình là phương pháp tư duy đối lập với biện chứng. Nó nhìn sự vật tĩnh tại và tách rời."},
{id:35,type:"verbatim",q:"Phương pháp siêu hình nhận thức đối tượng ra sao?",o:["Trong liên hệ phổ biến và phát triển","Trong mâu thuẫn nội tại của sự vật","Trong cô lập, tách rời và tĩnh tại","Trong sinh thành và tiêu vong liên tục"],a:"C",ex:"Siêu hình nhìn sự vật cô lập, tĩnh tại, tách rời. Liên hệ, phát triển và mâu thuẫn là đặc điểm của biện chứng."},
{id:36,type:"verbatim",q:"Theo phương pháp siêu hình, biến đổi thường được xem là gì?",o:["Kết quả của mâu thuẫn nội tại sự vật","Quá trình phát triển về chất bên trong","Sự chuyển hóa giữa các mặt đối lập","Sự tăng giảm đơn thuần về số lượng"],a:"D",ex:"Siêu hình thường coi biến đổi chỉ là tăng giảm số lượng, không thấy sự chuyển hóa về chất và mâu thuẫn nội tại."},
{id:37,type:"verbatim",q:"Phương pháp siêu hình có nguồn gốc hợp lý từ lĩnh vực nào?",o:["Toán học và vật lý học cổ điển","Thần thoại và tôn giáo nguyên thủy","Văn học và nghệ thuật dân gian","Tâm lý học và ngôn ngữ hiện đại"],a:"A",ex:"Phương pháp siêu hình có nguồn gốc hợp lý từ toán học và vật lý cổ điển, khi cần cô lập đối tượng trong điều kiện xác định."},
{id:38,type:"verbatim",q:"Hạn chế của siêu hình khi mở rộng phạm vi là gì?",o:["Làm nhận thức rơi vào phương pháp biện chứng","Dễ làm nhận thức rơi vào phiến diện, máy móc","Luôn phát hiện đúng mâu thuẫn bên trong","Luôn thấy sự vận động không ngừng của sự vật"],a:"B",ex:"Khi áp dụng rộng, siêu hình dễ máy móc, phiến diện vì không thấy liên hệ, vận động và phát triển."},
{id:39,type:"verbatim",q:"Phương pháp biện chứng nhận thức đối tượng như thế nào?",o:["Trong trạng thái cô lập và không biến đổi","Trong cảm giác chủ quan của từng người","Trong liên hệ, vận động và phát triển","Trong sự tách rời khỏi mọi quan hệ"],a:"C",ex:"Biện chứng nhìn sự vật trong mối liên hệ, vận động, phát triển. Cô lập và tĩnh tại là cách nhìn siêu hình."},
{id:40,type:"verbatim",q:"Theo quan điểm biện chứng, nguồn gốc vận động là gì?",o:["Sự đứng yên tuyệt đối của sự vật","Sự tăng giảm ngẫu nhiên bên ngoài","Sự phủ nhận mọi mâu thuẫn nội tại","Đấu tranh giữa các mặt đối lập"],a:"D",ex:"Biện chứng coi mâu thuẫn và đấu tranh giữa các mặt đối lập là nguồn gốc của vận động, phát triển."},
{id:41,type:"verbatim",q:"Phương pháp biện chứng giúp con người điều gì?",o:["Nhận thức và cải tạo thế giới hiệu quả hơn","Tin rằng thế giới hoàn toàn đứng yên","Tách mọi sự vật khỏi mối liên hệ","Phủ nhận sự phát triển của sự vật"],a:"A",ex:"Biện chứng phản ánh hiện thực đúng hơn nên giúp nhận thức và cải tạo thế giới. Các phương án còn lại là biểu hiện siêu hình."},
{id:42,type:"verbatim",q:"Phép biện chứng trong lịch sử có mấy hình thức cơ bản?",o:["Hai hình thức cơ bản","Ba hình thức cơ bản","Bốn hình thức cơ bản","Năm hình thức cơ bản"],a:"B",ex:"Có ba hình thức: biện chứng tự phát cổ đại, biện chứng duy tâm và biện chứng duy vật."},
{id:43,type:"verbatim",q:"Hình thức đầu tiên của phép biện chứng là gì?",o:["Phép biện chứng duy vật Mácxít","Phép biện chứng duy tâm Đức","Phép biện chứng tự phát cổ đại","Phép biện chứng kinh viện trung cổ"],a:"C",ex:"Hình thức đầu tiên là phép biện chứng tự phát thời cổ đại. Duy vật Mácxít và duy tâm Đức xuất hiện muộn hơn."},
{id:44,type:"verbatim",q:"Phép biện chứng tự phát cổ đại có đặc điểm nào?",o:["Có hệ thống khoa học thực nghiệm hiện đại","Dựa hoàn toàn trên ý niệm tuyệt đối","Phủ nhận sự vận động của vũ trụ","Trực kiến, tự phát và còn mộc mạc"],a:"D",ex:"Biện chứng cổ đại thấy sự vận động bằng trực kiến nhưng còn tự phát, chưa có cơ sở khoa học chặt chẽ."},
{id:45,type:"verbatim",q:"Đỉnh cao của phép biện chứng duy tâm gắn với triết học nào?",o:["Triết học cổ điển Đức","Triết học trung cổ kinh viện","Triết học duy vật cổ đại","Triết học thực chứng hiện đại"],a:"A",ex:"Phép biện chứng duy tâm đạt đỉnh cao trong triết học cổ điển Đức, đặc biệt ở Hegel."},
{id:46,type:"verbatim",q:"Ai là người hoàn thiện phép biện chứng duy tâm trong triết học Đức?",o:["Kant","Hegel","Feuerbach","Descartes"],a:"B",ex:"Hegel là người trình bày hoàn chỉnh phép biện chứng duy tâm. Kant là người khởi đầu một số yếu tố, không phải người hoàn thiện."},
{id:47,type:"verbatim",q:"Phép biện chứng duy tâm cho rằng biện chứng bắt đầu và kết thúc ở đâu?",o:["Trong vật chất khách quan độc lập","Trong kinh nghiệm sản xuất xã hội","Trong tinh thần hoặc ý niệm","Trong dữ liệu khoa học thực nghiệm"],a:"C",ex:"Biện chứng duy tâm quy sự vận động về tinh thần, ý niệm. Phép biện chứng duy vật mới đặt cơ sở ở thế giới vật chất."},
{id:48,type:"verbatim",q:"Phép biện chứng duy vật do ai xây dựng?",o:["Kant và Hegel","Hume và Berkeley","Descartes và Spinoza","Mác và Ăngghen"],a:"D",ex:"Phép biện chứng duy vật do Mác và Ăngghen xây dựng, sau đó được Lênin và các nhà mácxít phát triển."},
{id:49,type:"verbatim",q:"Mác và Ăngghen kế thừa điều gì từ phép biện chứng duy tâm?",o:["Hạt nhân hợp lý của phép biện chứng","Toàn bộ hệ thống duy tâm thần bí","Quan điểm phủ nhận vật chất khách quan","Tư tưởng vật tự nó không thể biết"],a:"A",ex:"Mác và Ăngghen kế thừa hạt nhân hợp lý, loại bỏ tính duy tâm thần bí. Vì vậy không phải sao chép toàn bộ Hegel."},
{id:50,type:"verbatim",q:"Phép biện chứng duy vật là học thuyết về điều gì?",o:["Cảm giác riêng của cá nhân nhận thức","Mối liên hệ phổ biến và sự phát triển","Sự đứng yên tuyệt đối của mọi sự vật","Sự bất lực của con người trước chân lý"],a:"B",ex:"Phép biện chứng duy vật là học thuyết khoa học về mối liên hệ phổ biến và sự phát triển. Các ý khác không đúng bản chất."},

{id:51,type:"inference",q:"Vì sao quan hệ vật chất - ý thức được gọi là vấn đề cơ bản?",o:["Vì cách trả lời nó quyết định lập trường triết học","Vì nó chỉ là câu hỏi nhỏ trong tâm lý học","Vì nó không ảnh hưởng đến thế giới quan","Vì nó chỉ xuất hiện trong khoa học tự nhiên"],a:"A",ex:"Cách trả lời vật chất - ý thức quyết định một học thuyết thuộc duy vật hay duy tâm, khả tri hay bất khả tri. Vì vậy nó là nền tảng."},
{id:52,type:"inference",q:"Nếu một học thuyết cho rằng ý thức cá nhân tạo ra sự vật, nó thuộc khuynh hướng nào?",o:["Chủ nghĩa duy vật biện chứng","Chủ nghĩa duy tâm chủ quan","Chủ nghĩa duy vật siêu hình","Chủ nghĩa khả tri duy vật"],a:"B",ex:"Ý thức cá nhân được coi là cái có trước là duy tâm chủ quan. Duy vật không xem cảm giác cá nhân là nguồn gốc của sự vật."},
{id:53,type:"inference",q:"Nếu một học thuyết cho rằng Thượng đế sáng tạo thế giới, nó gần với gì nhất?",o:["Duy vật chất phác thời cổ đại","Duy vật biện chứng hiện đại","Duy tâm khách quan tôn giáo","Khả tri luận trong khoa học"],a:"C",ex:"Thượng đế là một tinh thần khách quan được xem có trước thế giới, nên gần với duy tâm khách quan, không phải duy vật."},
{id:54,type:"inference",q:"Vì sao duy vật chất phác được xem vừa tiến bộ vừa hạn chế?",o:["Vì nó hoàn toàn phủ nhận giới tự nhiên","Vì nó chỉ dựa vào ý niệm siêu nhiên","Vì nó đã có đầy đủ khoa học hiện đại","Vì nó chống thần linh nhưng còn trực quan"],a:"D",ex:"Nó tiến bộ vì giải thích thế giới bằng tự nhiên, nhưng hạn chế vì còn cảm tính, mộc mạc và thiếu cơ sở khoa học."},
{id:55,type:"inference",q:"Ví dụ nhìn xã hội như một cỗ máy tĩnh tại gần với lập trường nào?",o:["Chủ nghĩa duy vật siêu hình","Phép biện chứng duy vật","Khả tri luận khoa học","Hoài nghi luận cổ đại"],a:"A",ex:"Cách nhìn máy móc, tĩnh tại và tách rời là biểu hiện của duy vật siêu hình hoặc phương pháp siêu hình."},
{id:56,type:"inference",q:"Vì sao duy vật biện chứng cao hơn duy vật siêu hình?",o:["Vì nó phủ nhận sự tồn tại của vật chất","Vì nó thấy vật chất trong liên hệ và phát triển","Vì nó chỉ dựa vào cảm giác của cá nhân","Vì nó giải thích thế giới bằng Thượng đế"],a:"B",ex:"Duy vật biện chứng không chỉ thừa nhận vật chất mà còn thấy sự vật trong vận động, liên hệ và phát triển."},
{id:57,type:"inference",q:"Nếu một người nói chỉ biết hiện tượng, không biết bản chất, người đó nghiêng về gì?",o:["Chủ nghĩa duy vật biện chứng","Chủ nghĩa duy vật chất phác","Bất khả tri luận triết học","Khả tri luận khoa học"],a:"C",ex:"Bất khả tri luận cho rằng con người không thể nhận thức bản chất thật sự, chỉ biết hiện tượng hoặc biểu hiện bên ngoài."},
{id:58,type:"inference",q:"Nếu một người tin khoa học có thể dần hiểu bản chất sự vật, người đó gần với gì?",o:["Bất khả tri luận tuyệt đối","Duy tâm chủ quan cực đoan","Hoài nghi luận cực đoan","Khả tri luận trong nhận thức"],a:"D",ex:"Tin rằng con người có thể nhận thức bản chất thế giới là lập trường khả tri luận. Bất khả tri và hoài nghi cực đoan phủ nhận hoặc nghi ngờ điều này."},
{id:59,type:"inference",q:"Vì sao Mác - Lênin phê phán bất khả tri luận?",o:["Vì nó hạ thấp khả năng nhận thức thế giới của con người","Vì nó khẳng định con người hiểu bản chất sự vật","Vì nó đề cao thực tiễn kiểm nghiệm chân lý","Vì nó bảo vệ lập trường duy vật biện chứng"],a:"A",ex:"Bất khả tri luận phủ nhận hoặc hạn chế khả năng nhận thức bản chất. Mác - Lênin khẳng định nhận thức phát triển thông qua thực tiễn."},
{id:60,type:"inference",q:"Hoài nghi vừa phải có thể có tác dụng tích cực nào?",o:["Làm con người phủ nhận mọi chân lý khoa học","Giúp chống giáo điều và kiểm tra tri thức","Buộc con người từ bỏ mọi hoạt động nhận thức","Khiến mọi tri thức đều trở thành vô nghĩa"],a:"B",ex:"Hoài nghi hợp lý giúp đặt câu hỏi và chống giáo điều. Hoài nghi cực đoan mới dẫn đến phủ nhận khả năng đạt chân lý."},
{id:61,type:"inference",q:"Nếu đánh giá một sinh viên chỉ bằng một điểm số hiện tại, đó là cách nhìn nào?",o:["Biện chứng vì thấy quá trình phát triển","Duy vật biện chứng vì xét quan hệ xã hội","Siêu hình vì cô lập và tĩnh tại hóa đối tượng","Khả tri vì tin vào khả năng nhận thức"],a:"C",ex:"Chỉ nhìn một điểm số, không xét quá trình và hoàn cảnh là cách nhìn cô lập, phiến diện, gần với phương pháp siêu hình."},
{id:62,type:"inference",q:"Nếu đánh giá sinh viên qua quá trình, hoàn cảnh và sự tiến bộ, đó là cách nhìn nào?",o:["Siêu hình vì chỉ nhìn trạng thái đứng yên","Bất khả tri vì phủ nhận khả năng hiểu người khác","Duy tâm vì xem cảm xúc quyết định tất cả","Biện chứng vì xét liên hệ và phát triển"],a:"D",ex:"Xét quá trình, hoàn cảnh, quan hệ và sự thay đổi là cách nhìn biện chứng, không phải siêu hình."},
{id:63,type:"inference",q:"Điểm khác nhau chính giữa siêu hình và biện chứng là gì?",o:["Siêu hình nhìn tĩnh tại, biện chứng nhìn vận động","Siêu hình luôn đúng hơn, biện chứng luôn sai hơn","Siêu hình là duy vật, biện chứng là duy tâm","Siêu hình là khả tri, biện chứng là bất khả tri"],a:"A",ex:"Siêu hình nhấn mạnh cô lập, tĩnh tại; biện chứng nhấn mạnh liên hệ, vận động, phát triển. Các cặp còn lại không đúng bản chất."},
{id:64,type:"inference",q:"Vì sao siêu hình từng có vai trò trong cơ học cổ điển?",o:["Vì nó luôn giải thích đúng mọi vấn đề xã hội","Vì nó hữu ích khi cô lập đối tượng trong điều kiện ổn định","Vì nó phủ nhận hoàn toàn việc đo đạc khoa học","Vì nó dựa chủ yếu vào tinh thần tuyệt đối"],a:"B",ex:"Trong cơ học cổ điển, việc cô lập đối tượng và xét điều kiện ổn định có giá trị nhất định. Nhưng mở rộng tuyệt đối sẽ thành máy móc."},
{id:65,type:"inference",q:"Nói biện chứng phản ánh hiện thực đúng hơn vì lý do nào?",o:["Vì nó phủ nhận mối liên hệ giữa các sự vật","Vì nó chỉ nhìn các sự vật đứng yên tuyệt đối","Vì hiện thực luôn liên hệ, vận động, biến đổi","Vì hiện thực chỉ là cảm giác của cá nhân"],a:"C",ex:"Hiện thực không đứng yên mà luôn vận động và liên hệ. Biện chứng phù hợp hơn vì phản ánh đúng đặc điểm này."},
{id:66,type:"inference",q:"Nếu một sự thay đổi được giải thích bằng mâu thuẫn bên trong, đó là tư duy nào?",o:["Tư duy siêu hình máy móc","Tư duy hoài nghi cực đoan","Tư duy duy tâm chủ quan","Tư duy biện chứng phát triển"],a:"D",ex:"Biện chứng coi mâu thuẫn nội tại là nguồn gốc vận động và phát triển. Siêu hình thường chỉ thấy nguyên nhân bên ngoài."},
{id:67,type:"inference",q:"Vì sao phép biện chứng cổ đại được gọi là tự phát?",o:["Vì nó thấy vận động bằng trực kiến, chưa có cơ sở khoa học đầy đủ","Vì nó hoàn toàn dựa vào phòng thí nghiệm hiện đại","Vì nó phủ nhận mọi sự biến đổi trong tự nhiên","Vì nó được xây dựng bởi Mác và Ăngghen"],a:"A",ex:"Các nhà cổ đại đã thấy thế giới vận động nhưng còn trực kiến, tự phát, chưa có khoa học hiện đại làm cơ sở."},
{id:68,type:"inference",q:"Hegel đóng góp gì cho phép biện chứng trong lịch sử?",o:["Ông phủ nhận hoàn toàn vận động của ý niệm","Ông hệ thống hóa phép biện chứng duy tâm","Ông sáng lập chủ nghĩa duy vật biện chứng","Ông chứng minh vật chất có trước ý thức"],a:"B",ex:"Hegel hệ thống hóa phép biện chứng nhưng trên lập trường duy tâm. Mác và Ăngghen mới xây dựng biện chứng duy vật."},
{id:69,type:"inference",q:"Mác khác Hegel căn bản ở điểm nào khi dùng phép biện chứng?",o:["Mác đặt biện chứng trên nền tảng vật chất","Mác đặt biện chứng trên nền tảng ý niệm","Mác phủ nhận hoàn toàn sự phát triển","Mác cho rằng không thể nhận thức thế giới"],a:"A",ex:"Mác kế thừa phép biện chứng nhưng đặt nó trên lập trường duy vật. Hegel đặt biện chứng trên nền tảng ý niệm, tinh thần."},
{id:70,type:"inference",q:"Câu 'vật tự nó sẽ buộc phải biến thành vật cho ta' hàm ý gì?",o:["Con người không bao giờ hiểu được bản chất sự vật","Nhận thức có thể tiến dần vào bản chất sự vật","Sự vật chỉ tồn tại trong cảm giác chủ quan","Kinh nghiệm không có vai trò trong nhận thức"],a:"B",ex:"Theo khả tri luận duy vật, cái chưa biết có thể dần trở thành cái đã biết nhờ thực tiễn và nhận thức phát triển."},
{id:71,type:"inference",q:"Nếu đề hỏi hai mặt của vấn đề cơ bản triết học, đáp án nào đầy đủ nhất?",o:["Vật chất - ý thức cái nào trước; con người có nhận thức được thế giới không","Dân tộc - nhà nước cái nào trước; con người có cần đạo đức không","Cá nhân - tập thể cái nào trước; xã hội có cần pháp luật không","Kinh tế - văn hóa cái nào trước; khoa học có cần dữ liệu không"],a:"A",ex:"Hai mặt là bản thể luận về vật chất - ý thức và nhận thức luận về khả năng nhận thức thế giới. Các cặp còn lại là vấn đề xã hội cụ thể."},
{id:72,type:"inference",q:"Nếu đề yêu cầu phân biệt duy vật và duy tâm, trọng tâm phải nêu gì?",o:["Sự khác nhau về thái độ với nghệ thuật","Sự khác nhau về cái có trước giữa vật chất và ý thức","Sự khác nhau về số lượng tác phẩm triết học","Sự khác nhau về nguồn gốc ngôn ngữ triết học"],a:"B",ex:"Phân biệt duy vật và duy tâm phải dựa vào câu trả lời vật chất hay ý thức có trước và quyết định. Các yếu tố khác không phải trọng tâm."},
{id:73,type:"inference",q:"Nếu đề hỏi phân biệt khả tri và bất khả tri, trọng tâm là gì?",o:["Cách đánh giá vai trò của giai cấp thống trị","Cách hiểu về nguồn gốc của tôn giáo","Cách trả lời về khả năng nhận thức thế giới","Cách phân loại phép biện chứng trong lịch sử"],a:"C",ex:"Khả tri và bất khả tri khác nhau ở việc con người có thể nhận thức bản chất thế giới hay không."},
{id:74,type:"inference",q:"Nếu đề hỏi các hình thức của chủ nghĩa duy vật, chọn nhóm nào?",o:["Duy tâm chủ quan, duy tâm khách quan, nhị nguyên","Khả tri luận, bất khả tri luận, hoài nghi luận","Biện chứng tự phát, biện chứng duy tâm, biện chứng duy vật","Duy vật chất phác, duy vật siêu hình, duy vật biện chứng"],a:"D",ex:"Ba hình thức chủ nghĩa duy vật là chất phác, siêu hình và biện chứng. Nhóm biện chứng là phân loại phép biện chứng, không phải duy vật."},
{id:75,type:"inference",q:"Nếu đề hỏi các hình thức của phép biện chứng, chọn nhóm nào?",o:["Biện chứng tự phát, biện chứng duy tâm, biện chứng duy vật","Duy vật chất phác, duy vật siêu hình, duy vật biện chứng","Duy tâm chủ quan, duy tâm khách quan, nhị nguyên luận","Khả tri luận, bất khả tri luận, hoài nghi luận"],a:"A",ex:"Phép biện chứng trong lịch sử có ba hình thức: tự phát cổ đại, duy tâm và duy vật. Các nhóm khác thuộc nội dung khác."},
{id:76,type:"inference",q:"Nếu một quan điểm thừa nhận cả vật chất và tinh thần độc lập, nó là gì?",o:["Nhất nguyên luận duy vật","Nhị nguyên luận triết học","Duy vật biện chứng Mácxít","Duy tâm chủ quan cực đoan"],a:"B",ex:"Thừa nhận hai bản nguyên độc lập là nhị nguyên luận. Nhất nguyên luận chỉ thừa nhận một bản nguyên."},
{id:77,type:"inference",q:"Vì sao nhị nguyên luận thường bị xem là không triệt để?",o:["Vì khi giải thích cụ thể dễ dao động giữa duy vật và duy tâm","Vì nó luôn khẳng định vật chất quyết định ý thức triệt để","Vì nó hoàn toàn phủ nhận sự tồn tại của tinh thần","Vì nó chỉ thừa nhận một bản nguyên vật chất duy nhất"],a:"A",ex:"Nhị nguyên luận thừa nhận hai bản nguyên nên khi giải thích cụ thể thường dao động, không triệt để như nhất nguyên duy vật hoặc duy tâm."},
{id:78,type:"inference",q:"Tôn giáo thường sử dụng học thuyết duy tâm vì lý do nào gần nhất?",o:["Vì nó luôn phủ nhận mọi lực lượng siêu nhiên","Vì nó giải thích thế giới bằng lực lượng tinh thần siêu nhiên","Vì nó chỉ dựa vào nguyên nhân vật chất khách quan","Vì nó là hình thức của chủ nghĩa duy vật biện chứng"],a:"B",ex:"Tôn giáo thường giải thích thế giới bằng thần linh, Thượng đế hoặc lực lượng tinh thần, nên gần với duy tâm khách quan."},
{id:79,type:"inference",q:"Nếu nói 'sự vật vừa là nó, vừa đang trở thành cái khác', đó là tinh thần nào?",o:["Tinh thần biện chứng về sự vận động","Tinh thần siêu hình về sự bất biến","Tinh thần bất khả tri về chân lý","Tinh thần duy tâm chủ quan cảm giác"],a:"A",ex:"Biện chứng thấy sự vật không chỉ tồn tại hiện tại mà còn vận động, biến đổi và phát triển thành cái khác."},
{id:80,type:"inference",q:"Kết luận đúng nhất cho toàn bộ phần này là gì?",o:["Triết học chỉ bàn về tôn giáo và không liên quan nhận thức","Duy tâm và siêu hình là hình thức cao nhất của khoa học","Vấn đề cơ bản là vật chất - ý thức; phương pháp đúng cần biện chứng","Con người không thể nhận thức thế giới và không thể cải tạo nó"],a:"C",ex:"Phần này xoay quanh quan hệ vật chất - ý thức, phân biệt duy vật - duy tâm, khả tri - bất khả tri, và nhấn mạnh phương pháp biện chứng."}
];
let answers=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");let onlyLeft=false;let onlyWrong=false;
const root=document.getElementById("root"),search=document.getElementById("search"),kind=document.getElementById("kind"),btnLeft=document.getElementById("unanswered"),btnWrong=document.getElementById("wrongOnly"),btnCopy=document.getElementById("copy"),btnReset=document.getElementById("reset");
function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(answers))}
function isCorrect(q){return answers[q.id]&&answers[q.id]===q.a}
function stats(){const total=questions.length,done=questions.filter(q=>answers[q.id]).length,left=total-done,right=questions.filter(q=>isCorrect(q)).length,p=Math.round(done/total*100);document.getElementById("total").textContent=total;document.getElementById("done").textContent=done;document.getElementById("left").textContent=left;document.getElementById("right").textContent=right;document.getElementById("percent").textContent=p+"%";document.getElementById("fill").style.width=p+"%"}
function filtered(){const s=norm(search.value.trim()),k=kind.value;return questions.filter(q=>(k==="all"||q.type===k)&&(!s||norm(q.q+" "+q.o.join(" ")).includes(s))&&(!onlyLeft||!answers[q.id])&&(!onlyWrong||(answers[q.id]&&answers[q.id]!==q.a)))}
function feedbackHtml(q){const chosen=answers[q.id];if(!chosen)return "";if(chosen===q.a){return `<div class="feedback show good"><b class="good">Đúng.</b> ${q.ex}</div>`}return `<div class="feedback show bad"><b class="bad">Sai.</b> Bạn chọn <b>${chosen}</b>, đáp án đúng là <b>${q.a}</b>. ${q.ex}</div>`}
function render(){stats();const arr=filtered();root.innerHTML="";if(!arr.length){root.innerHTML='<section class="panel empty">Không có câu hỏi phù hợp với bộ lọc hiện tại.</section>';return}const groups=[["Verbatim Questions","Bám sát nội dung giáo trình",arr.filter(q=>q.type==="verbatim")],["Inference Questions","Hỏi suy luận và hiểu bản chất",arr.filter(q=>q.type==="inference")]];groups.forEach(([title,sub,items])=>{if(!items.length)return;const sec=document.createElement("section");sec.innerHTML=`<h2>${title}<span class="badge">${items.length} câu</span></h2>`;items.forEach(q=>{const chosen=answers[q.id];const card=document.createElement("article");card.className="qcard"+(chosen?" answered":"");card.innerHTML=`<div class="qhead"><div class="qno">Câu ${q.id}</div><div class="qtype">${q.type==="verbatim"?"Bám sát giáo trình":"Suy luận"}</div></div><div class="qtext">${q.q}</div><div class="opts">${q.o.map((x,i)=>{const L="ABCD"[i];let cls="opt";if(chosen===L)cls+=" selected";if(chosen&&L===q.a)cls+=" correct";if(chosen===L&&chosen!==q.a)cls+=" wrong";return `<label class="${cls}"><input type="radio" name="q${q.id}" value="${L}" ${chosen===L?"checked":""}/><span><strong>${L}.</strong> ${x}</span></label>`}).join("")}</div>${feedbackHtml(q)}`;card.querySelectorAll("input").forEach(inp=>inp.onchange=e=>{answers[q.id]=e.target.value;save();render()});sec.appendChild(card)});root.appendChild(sec)})}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1700)}
search.oninput=render;kind.onchange=render;btnLeft.onclick=()=>{onlyLeft=!onlyLeft;if(onlyLeft)onlyWrong=false;btnLeft.textContent=onlyLeft?"Hiện tất cả câu":"Lọc câu chưa làm";btnWrong.textContent="Lọc câu sai";render()};btnWrong.onclick=()=>{onlyWrong=!onlyWrong;if(onlyWrong)onlyLeft=false;btnWrong.textContent=onlyWrong?"Hiện tất cả câu":"Lọc câu sai";btnLeft.textContent="Lọc câu chưa làm";render()};btnCopy.onclick=async()=>{const text=questions.map(q=>`${q.id}${answers[q.id]||"_"}`).join(", ");try{await navigator.clipboard.writeText(text)}catch(e){const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove()}toast("Đã copy đáp án của bạn")};btnReset.onclick=()=>{if(!confirm("Xóa toàn bộ đáp án đã chọn?"))return;answers={};save();render();toast("Đã xóa đáp án")};render();
</script>
